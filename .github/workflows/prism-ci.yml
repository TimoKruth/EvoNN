name: Prism CI

on:
  push:
    paths:
      - "EvoNN-Prism/**"
      - "shared-benchmarks/**"
      - "MONOREPO.md"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "EvoNN-Prism/**"
      - "shared-benchmarks/**"
      - "MONOREPO.md"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  prism:
    runs-on: macos-14
    env:
      PRISM_CHECK_SCRIPT: scripts/ci/prism-checks.sh
      PRISM_PACKAGE: prism
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install Prism dev dependencies
        run: uv sync --package "${PRISM_PACKAGE}" --extra dev

      - name: Ruff
        run: bash "${PRISM_CHECK_SCRIPT}" ruff

      - name: Pytest
        run: bash "${PRISM_CHECK_SCRIPT}" pytest
