name: tier3_topology
description: >
  Tier 3 Benchmarks -- tasks where EvoNN-2's topology evolution and DAG search
  are expected to have an advantage. Used for Track B research questions.
tier: 3
comparison: evonn2_leaning
benchmarks:
  # Tasks with complex decision boundaries favoring flexible topology
  - cls_f10_c5                # multi-class with moderate features
  - gauss_q_f5_c3             # circular boundaries need skip connections
  - cls_f20_c2                # redundant features -- topology can prune
  # Regression tasks where topology matters
  - friedman1_n100            # nonlinear interactions
evaluation_protocol:
  validation_split: 0.2
  metric: cross_entropy  # or mse for regression
  seed: 42
  epochs: 20
