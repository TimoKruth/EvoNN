default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: shared-ruff
        name: Shared Ruff
        entry: bash scripts/ci/shared-checks.sh ruff
        language: system
        pass_filenames: false
        files: ^(EvoNN-Shared/|MONOREPO\.md$|pyproject\.toml$|uv\.lock$)
        stages:
          - pre-commit

      - id: compare-ruff
        name: Compare Ruff
        entry: bash scripts/ci/compare-checks.sh ruff
        language: system
        pass_filenames: false
        files: ^(EvoNN-Compare/|EvoNN-Shared/|shared-benchmarks/|MONOREPO\.md$|pyproject\.toml$|uv\.lock$)
        stages:
          - pre-commit

      - id: contenders-ruff
        name: Contenders Ruff
        entry: bash scripts/ci/contenders-checks.sh ruff
        language: system
        pass_filenames: false
        files: ^(EvoNN-Contenders/|EvoNN-Shared/|shared-benchmarks/|MONOREPO\.md$|pyproject\.toml$|uv\.lock$)
        stages:
          - pre-commit

      - id: prism-ruff
