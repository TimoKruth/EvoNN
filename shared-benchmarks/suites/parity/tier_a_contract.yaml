name: tier_a_contract
tier: 1
ladder_tier: A
description: Fast contract-validation benchmark lane with explicit contender-floor metadata.
usage_classification:
  smoke:
    evaluation_count: 16
    notes: Fastest end-to-end contract check.
  local:
    evaluation_count: 64
    notes: Default Tier A validation budget.
promotion_requirements:
  clean_runs_required: 1
  decision_grade_required: true
benchmarks:
  - benchmark_id: iris_classification
    native_ids: {prism: iris, topograph: iris, stratograph: iris, primordia: iris, contenders: iris, evonn: iris_classification, evonn2: iris, hybrid: iris}
    task_kind: classification
    benchmark_group: tabular
    benchmark_family: tabular
    domain: classic_tabular
    difficulty: smoke
    runtime_class: ci
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, linear_svc]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: wine_classification
    native_ids: {prism: wine, topograph: wine, stratograph: wine, primordia: wine, contenders: wine, evonn: wine_classification, evonn2: wine, hybrid: wine}
