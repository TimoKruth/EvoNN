    benchmark_family: tabular
    domain: classic_tabular
    difficulty: smoke
    runtime_class: ci
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, linear_svc]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: moons_classification
    native_ids: {prism: moons, topograph: moons, stratograph: moons, primordia: moons, contenders: moons, evonn: moons_classification, evonn2: moons, hybrid: moons}
