    notes: Special-only broad increment lane; eighty evaluations per benchmark.
  special_overnight:
    evaluation_count: 800
    notes: Overnight Tier D increment validation.
  special_weekend:
    evaluation_count: 1600
    notes: Weekend-scale Tier D increment validation.
