    benchmark_family: tabular-regression
    domain: openml_regression
    difficulty: hard
    runtime_class: overnight
    metric_name: mse
    metric_direction: min
    minimum_required_contenders: [hist_gb, extra_trees, ridge_or_linear, svr_or_nystroem_svr]
budget_policy:
  evaluation_count: 96
  epochs_per_candidate: 20
  budget_tolerance_pct: 10.0
seed_policy:
  mode: shared
  required: true
