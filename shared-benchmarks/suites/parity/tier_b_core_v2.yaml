  - benchmark_id: openml_cpu_activity
    native_ids: {prism: cpu_performance, topograph: cpu_performance, stratograph: cpu_performance, primordia: cpu_performance, contenders: cpu_performance, evonn: openml_cpu_activity, evonn2: cpu_performance, hybrid: cpu_performance}
