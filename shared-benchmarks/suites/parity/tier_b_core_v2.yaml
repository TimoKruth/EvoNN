name: tier_b_core_v2
tier: 2
ladder_tier: B
description: Additive Tier B increment. Contains only benchmarks introduced after Tier A so sequential tier runs do not repeat Tier A work.
usage_classification:
  local: {evaluation_count: 96, notes: Sixteen evaluations per benchmark across the 6-benchmark Tier B increment.}
  overnight: {evaluation_count: 384, notes: Sixty-four evaluations per benchmark for deeper local studies.}
  extended: {evaluation_count: 768, notes: One hundred twenty-eight evaluations per benchmark for promotion evidence.}
  weekend: {evaluation_count: 1536, notes: Two hundred fifty-six evaluations per benchmark for longer runs.}
promotion_requirements:
  clean_runs_at_96: 2
  clean_runs_at_384: 1
  additive_tier: true
  cumulative_pack: tier_b_core_v2_cumulative
benchmarks:
  - benchmark_id: openml_bank_marketing
    native_ids: {prism: bank_marketing, topograph: bank_marketing, stratograph: bank_marketing, primordia: bank_marketing, contenders: bank_marketing, evonn: openml_bank_marketing, evonn2: bank_marketing, hybrid: bank_marketing}
    task_kind: classification
    benchmark_group: tabular
    benchmark_family: tabular
    domain: openml_tabular
    difficulty: hard
    runtime_class: overnight
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, linear_svc]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: openml_letter
    native_ids: {prism: letter, topograph: letter, stratograph: letter, primordia: letter, contenders: letter, evonn: openml_letter, evonn2: letter, hybrid: letter}
    task_kind: classification
    benchmark_group: tabular
    benchmark_family: tabular
    domain: openml_tabular
    difficulty: hard
    runtime_class: overnight
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, linear_svc]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: openml_gas_sensor
    native_ids: {prism: gas_sensor, topograph: gas_sensor, stratograph: gas_sensor, primordia: gas_sensor, contenders: gas_sensor, evonn: openml_gas_sensor, evonn2: gas_sensor, hybrid: gas_sensor}
    task_kind: classification
    benchmark_group: tabular
    benchmark_family: tabular
    domain: openml_tabular
    difficulty: hard
    runtime_class: overnight
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, linear_svc]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: circles_classification
    native_ids: {prism: circles, topograph: circles, stratograph: circles, primordia: circles, contenders: circles, evonn: circles_classification, evonn2: circles, hybrid: circles}
    task_kind: classification
    benchmark_group: synthetic
    benchmark_family: synthetic
    domain: nonlinear_synthetic
    difficulty: core
    runtime_class: local
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [hist_gb, extra_trees, svm_nystroem_rbf]
    enhanced_optional_contenders: [xgb_small, lgbm_small, catboost_small]
    score_ceiling: 1.0
  - benchmark_id: fashionmnist_image
    native_ids: {prism: fashion_mnist, topograph: fashion_mnist, stratograph: fashion_mnist, primordia: fashion_mnist, contenders: fashion_mnist, evonn: fashionmnist_image, evonn2: fashion_mnist, hybrid: fashion_mnist}
    task_kind: classification
    benchmark_group: image
    benchmark_family: image-classification
    domain: small_image
    difficulty: hard
    runtime_class: overnight
    metric_name: accuracy
    metric_direction: max
    minimum_required_contenders: [mlp_wide, extra_trees]
    enhanced_optional_contenders: [cnn_small]
