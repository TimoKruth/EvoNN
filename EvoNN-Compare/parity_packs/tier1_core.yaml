name: tier1_core
tier: 1
description: >
  Symmetric parity pack for protocol validation and first head-to-head
  comparisons. All benchmarks are small tabular or low-cost structured tasks
  where neither parent should be structurally blocked.
benchmarks:
  - benchmark_id: iris_classification
    native_ids:
      evonn: iris_classification
      evonn2: iris
      hybrid: iris
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: wine_classification
    native_ids:
      evonn: wine_classification
      evonn2: wine
      hybrid: wine
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: breast_cancer
    native_ids:
      evonn: breast_cancer
      evonn2: breast_cancer
      hybrid: breast_cancer
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: moons_classification
    native_ids:
      evonn: moons_classification
      evonn2: moons
      hybrid: moons
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: digits_image
    native_ids:
      evonn: digits_image
      evonn2: digits
      hybrid: digits
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: diabetes_regression
    native_ids:
      evonn: diabetes_regression
      evonn2: diabetes
      hybrid: diabetes
    task_kind: regression
    metric_name: mse
    metric_direction: min
  - benchmark_id: friedman1_regression
    native_ids:
      evonn: friedman_regression
      evonn2: friedman1
      hybrid: friedman1
    task_kind: regression
    metric_name: mse
    metric_direction: min
  - benchmark_id: credit_g_classification
    native_ids:
      evonn: openml_credit_g
      evonn2: credit_g
      hybrid: credit_g
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
budget_policy:
  evaluation_count: 64
  epochs_per_candidate: 20
  budget_tolerance_pct: 10.0
seed_policy:
  mode: shared
  required: true
