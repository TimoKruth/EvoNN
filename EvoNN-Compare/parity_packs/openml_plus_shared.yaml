name: openml_plus_shared
tier: 1
description: >
  Shared OpenML-style tabular parity pack spanning the original CC18-style EvoNN
  coverage plus matching EvoNN-2 and Hybrid catalog entries. This is the main
  contender-compatible batch path for larger three-system comparisons.
benchmarks:
