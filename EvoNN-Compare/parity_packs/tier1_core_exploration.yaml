name: tier1_core_exploration
tier: 1
description: >
  Full-exploration variant of tier1_core. All efficiency optimizations disabled
  so every candidate gets equal training budget. Use with higher evaluation
  counts (256+) to test whether slow-starting topologies bloom given more time.
benchmarks:
  - benchmark_id: iris_classification
    native_ids:
      evonn: iris_classification
      evonn2: iris
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: wine_classification
    native_ids:
      evonn: wine_classification
      evonn2: wine
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: breast_cancer
    native_ids:
      evonn: breast_cancer
      evonn2: breast_cancer
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: moons_classification
    native_ids:
      evonn: moons_classification
      evonn2: moons
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: digits_image
    native_ids:
      evonn: digits_image
      evonn2: digits
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
  - benchmark_id: diabetes_regression
    native_ids:
      evonn: diabetes_regression
      evonn2: diabetes
    task_kind: regression
    metric_name: mse
    metric_direction: min
  - benchmark_id: friedman1_regression
    native_ids:
      evonn: friedman_regression
      evonn2: friedman1
    task_kind: regression
    metric_name: mse
    metric_direction: min
  - benchmark_id: credit_g_classification
    native_ids:
      evonn: openml_credit_g
      evonn2: credit_g
    task_kind: classification
    metric_name: accuracy
    metric_direction: max
budget_policy:
  evaluation_count: 256
  epochs_per_candidate: 20
  budget_tolerance_pct: 10.0
seed_policy:
  mode: shared
  required: true
exploration_policy:
  enabled: true
  disable_multi_fidelity: true
  disable_promotion_screen: true
  disable_epoch_scaling: true
  description: >
    Full-exploration mode: all candidates get equal training budget.
    Multi-fidelity scheduling, promotion screening, and Lamarckian epoch
    scaling are all disabled.
